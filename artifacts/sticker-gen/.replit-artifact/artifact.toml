kind = "web"
previewPath = "/"
title = "StickerAI"
version = "1.0.0"
id = "artifacts/sticker-gen"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24173

[services.development]
run = "pnpm --filter @workspace/sticker-gen run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sticker-gen", "run", "build" ]
publicDir = "artifacts/sticker-gen/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24173"
BASE_PATH = "/"
